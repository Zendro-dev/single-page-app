version: "3.8"

services:
  # Auth for the e2e suite - graphql-server is the only service with real
  # Keycloak credentials (see graphql-server/utils/auth/); the SPA never
  # holds a token, it authenticates via the httpOnly session cookie gqs
  # issues after a real Keycloak login (see cypress/support/commands.ts's
  # login() and login-form.test.ts).
  keycloak_postgres:
    container_name: keycloak_postgres_test
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    networks:
      - integrationtest

  keycloak:
    container_name: keycloak_test
    image: quay.io/keycloak/keycloak:26.2.0
    entrypoint: ["/opt/keycloak/bin/kc.sh", "start-dev"]
    depends_on:
      - keycloak_postgres
    ports:
      - "8082:8082"
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak_postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 8082
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME: http://localhost:8082/auth
      KC_HOSTNAME_STRICT_HTTPS: "false"
    networks:
      - integrationtest

  gql_postgres1:
    container_name: postgres1
    build:
      context: .
      dockerfile: Dockerfile.postgres
    ports:
     - 1234:5432
    networks:
     - instance1

  gql_cassandra1:
    container_name: cassandra1
    build:
      context: .
      dockerfile: Dockerfile.cassandra
    volumes:
      - ./docker-entrypoint.sh.cassandra:/docker-entrypoint.sh
      - ./cassandra-keyspace.cql:/docker-entrypoint-initdb.d/cassandra-keyspace.cql
    ports:
      - 9042:9042
    environment:
      - MAX_HEAP_SIZE=256M
      - HEAP_NEWSIZE=128M
    networks:
      - instance1

  gql_science_db_graphql_server1:
    container_name: server1
    depends_on:
      - gql_postgres1
    build:
      context: .
      dockerfile: Dockerfile.graphql_server
    volumes:
      - ../test_env/gql_science_db_graphql_server1:/usr/src/app
      - ./data_models_storage_config1.json:/usr/src/app/config/data_models_storage_config.json
      - ./migrateDbAndStartServer.sh:/usr/src/app/migrateDbAndStartServer.sh
      - ./.env:/usr/src/app/.env
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      REQUIRE_SIGN_IN: "false"
      LIMIT_RECORDS: 10000
      JQ_PATH: /usr/bin/jq
    networks:
      - integrationtest
      - instance1
    command:
      - /bin/sh
      - -c
      - |
        ./migrateDbAndStartServer.sh

